services:
  flashlight-keeper:
    container_name: flashlight-keeper
    image: ghcr.io/1percentsync/flashlight-keeper:latest
    pull_policy: always
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      - MAX_LIFETIME_MS=172800000
      - ENABLE_REFRESH=false
      # - SENTINEL_API_KEY=sk-...
      - SENTINEL_MODELS=deepseek-v4-flash
      # - INITIAL_TTL_MS=43200000
      # - SENTINEL_INTERVAL_MS=3600000  # default adaptive: 60min explore / 110min steady
    volumes:
      - ./data:/app/data
