name: Build and Push Keeper Image

on:
  push:
    branches: [main]
    paths: [keeper/**]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: keeper
          push: true
          tags: |
            ghcr.io/1percentsync/flashlight-keeper:latest
            ghcr.io/1percentsync/flashlight-keeper:${{ github.sha }}
